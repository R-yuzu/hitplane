<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>打飞机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: url('image/mmexport1774628300408.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        /* 主窗口 - 玻璃质感 */
        .glass-panel {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.3);
            padding: 20px 18px 24px 18px;
            transition: all 0.2s ease;
        }

        /* 游戏标题区 + 重玩按钮 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 0 8px;
        }
        .title {
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF9E0, #FFE6C7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        .score-area {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 6px 16px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 4px 8px rgba(0,0,0,0.1);
        }
        .score-area span {
            color: #FFD966;
            font-size: 1.6rem;
            font-weight: 800;
            margin-right: 4px;
        }
        .reset-btn {
            background: rgba(30, 30, 40, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,240,0.5);
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #fef9e8;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .reset-btn:active {
            transform: scale(0.96);
            background: rgba(80, 70, 60, 0.8);
        }

        /* 15x15 网格容器 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            background: rgba(245, 240, 235, 0.2);
            border-radius: 28px;
            padding: 12px;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        /* 初始格子：较深的透明灰色玻璃质感 */
        .cell {
            aspect-ratio: 1 / 1;
            background: rgba(70, 70, 80, 0.7);
            border-radius: 12px;
            margin: 3px;
            transition: all 0.08s linear;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(200,200,210,0.3);
            backdrop-filter: blur(1px);
        }

        /* 未命中（点开）变成透明乳白色玻璃 */
        .cell.miss {
            background: rgba(255, 250, 235, 0.85);
            box-shadow: inset 0 0 0 1px rgba(255,245,200,0.6);
        }
        /* 命中机身：透明绿色 */
        .cell.body-hit {
            background: rgba(80, 180, 100, 0.75);
            box-shadow: 0 0 4px rgba(80,220,100,0.5), inset 0 0 0 1px #c8ffb0;
        }
        /* 命中机头：透明深红色 */
        .cell.head-hit {
            background: rgba(220, 70, 60, 0.85);
            box-shadow: 0 0 8px rgba(255,80,50,0.6), inset 0 0 0 1px #ffb5a0;
        }

        .cell:active {
            transform: scale(0.96);
        }

        /* 规则小窗口 */
        .rule-card {
            background: rgba(20, 20, 30, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 14px 20px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,210,0.4);
            color: #fff7e8;
            font-size: 0.85rem;
            line-height: 1.4;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .rule-card h4 {
            font-size: 1rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        .rule-card p {
            margin: 4px 0;
        }
        .legend {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 8px;
            font-size: 0.75rem;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            display: inline-block;
        }
        .legend .gray-dot { background: rgba(255, 250, 235, 0.85); }   /* 乳白表示未命中 */
        .legend .green-dot { background: rgba(80, 180, 100, 0.8); }
        .legend .red-dot { background: rgba(220, 70, 60, 0.9); }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .glass-panel { padding: 14px 12px 20px; }
            .cell { margin: 2px; border-radius: 8px; }
            .grid-container { padding: 8px; }
            .reset-btn { padding: 6px 18px; font-size: 0.9rem; }
            .title { font-size: 1.5rem; }
        }
        @media (max-width: 480px) {
            .cell { margin: 1px; border-radius: 6px; }
            .legend { gap: 10px; }
        }

        /* 胜利弹窗 */
        .victory-toast {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,20,15,0.85);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 20px 30px;
            color: gold;
            font-weight: bold;
            font-size: 1.6rem;
            text-align: center;
            z-index: 1000;
            border: 2px solid rgba(255,215,0,0.6);
            box-shadow: 0 20px 30px black;
            animation: fadePop 0.3s ease;
            white-space: nowrap;
        }
        @keyframes fadePop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
        }
        @media (max-width: 550px) {
            .victory-toast { font-size: 1.2rem; white-space: normal; width: 80%; text-align: center; padding: 16px; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="game-header">
        <div class="title">✈ 打飞机</div>
        <div class="score-area">
            🎯 <span id="headsFound">0</span> / <span id="totalHeads">4</span>
        </div>
        <button class="reset-btn" id="resetGameBtn">🔄 重来</button>
    </div>

    <!-- 15x15 网格 -->
    <div class="grid-container" id="grid"></div>

    <!-- 规则说明小窗口（更新为士字形描述）-->
    <div class="rule-card">
        <h4>📜 机长起飞规则 · 打飞机</h4>
        <p>▪ 每架战机呈「<strong>士</strong>」字形：竖排4格（头→身→身→尾），<br>
        &nbsp;&nbsp;在机头往下第2格左右各伸出<strong>2格</strong>（宽翼），在机尾左右各伸出<strong>1格</strong>（尾翼）。<br>
        ▪ 点击格子 → <span style="color:#b0ffb0;">✔ 命中机身</span> 变绿，<span style="color:#ffaa88;">🔥 命中机头</span> 变红。<br>
        ▪ 若打偏 → 格子变为<span style="color:#fff0c0;">▣ 乳白玻璃</span>。 <strong>目标：找出全部 4 架战机的机头！</strong><br>
        ▪ 机头全部点亮，胜利礼炮 ✨ 点击「重来」可刷新战局，飞机位置及朝向随机重置。</p>
        <div class="legend">
            <span><i class="gray-dot"></i> 未命中（乳白）</span>
            <span><i class="green-dot"></i> 飞机身体</span>
            <span><i class="red-dot"></i> 飞机头部</span>
            <span>⭐ 击中全部机头获胜</span>
        </div>
    </div>
</div>

<script>
    // ---------- 游戏配置 ----------
    const GRID_SIZE = 15;
    const PLANE_COUNT = 4;

    // ★ 新飞机形状：士字形（机头朝下）
    // 偏移坐标 (dx, dy) , 原点为机头 (0,0)，向下为正y
    // 构成：竖线4格 (0,0)头，(1,0)身2，(2,0)身3，(3,0)尾
    // 中间横杠：在(1,0)左右各两格 → (1,-2),(1,-1),(1,1),(1,2)
    // 尾部横杠：在(3,0)左右各一格 → (3,-1),(3,1)
    // 总计10格
    const BASE_PLANE_SHAPE = [
        [0, 0],   // ★ 机头
        [1, 0],   // 机身第2格（横杠中心）
        [2, 0],   // 机身第3格
        [3, 0],   // 机尾
        [1, -2], [1, -1], [1, 1], [1, 2],  // 中间宽翼（左右各2格）
        [3, -1], [3, 1]                     // 尾部短翼
    ];

    // 四个方向: 0:下(原朝向), 1:右, 2:上, 3:左 (顺时针旋转)
    function rotateShape(shape, direction) {
        return shape.map(([dx, dy]) => {
            switch(direction) {
                case 0: return [dx, dy];           // 下
                case 1: return [dy, -dx];          // 右 (顺时针90°)
                case 2: return [-dx, -dy];         // 上 (180°)
                case 3: return [-dy, dx];          // 左 (逆时针90°)
                default: return [dx, dy];
            }
        });
    }

    // 全局游戏状态
    let boardType = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(-1));  // -1:无, 0:身体(非头), 1:头部
    let clickedState = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
    let headPositions = [];
    let headsDiscovered = 0;
    let discoveredHeadsSet = new Set();
    let gameActive = true;

    const gridContainer = document.getElementById('grid');
    const headsFoundSpan = document.getElementById('headsFound');
    const totalHeadsSpan = document.getElementById('totalHeads');
    const resetBtn = document.getElementById('resetGameBtn');
    totalHeadsSpan.innerText = PLANE_COUNT;

    // ---------- 辅助函数 ----------
    function clearGameData() {
        boardType = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(-1));
        clickedState = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
        headPositions = [];
        headsDiscovered = 0;
        discoveredHeadsSet.clear();
        gameActive = true;
        updateScoreUI();
    }

    // 检查飞机是否可放置（不重叠，不超界）
    function canPlacePlane(shapeOffsets, startX, startY) {
        for (let [dx, dy] of shapeOffsets) {
            const nx = startX + dx;
            const ny = startY + dy;
            if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return false;
            if (boardType[nx][ny] !== -1) return false;
        }
        return true;
    }

    // 放置飞机到boardType
    function placePlane(shapeOffsets, startX, startY, headList) {
        for (let i = 0; i < shapeOffsets.length; i++) {
            const [dx, dy] = shapeOffsets[i];
            const nx = startX + dx;
            const ny = startY + dy;
            if (i === 0) {
                boardType[nx][ny] = 1;   // 头部
                headList.push({x: nx, y: ny});
            } else {
                boardType[nx][ny] = 0;   // 身体/翼
            }
        }
    }

    // 随机生成所有飞机 (保证不重叠)
    function generateAllPlanes() {
        const maxAttempts = 1000;
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            clearGameData();
            let success = true;
            const tempHeads = [];

            for (let p = 0; p < PLANE_COUNT; p++) {
                let placed = false;
                for (let tryCnt = 0; tryCnt < 600; tryCnt++) {
                    const direction = Math.floor(Math.random() * 4);
                    const rotatedShape = rotateShape(BASE_PLANE_SHAPE, direction);
                    // 随机机头起始坐标
                    const startX = Math.floor(Math.random() * GRID_SIZE);
                    const startY = Math.floor(Math.random() * GRID_SIZE);
                    if (canPlacePlane(rotatedShape, startX, startY)) {
                        const headListHere = [];
                        placePlane(rotatedShape, startX, startY, headListHere);
                        if (headListHere.length === 1) {
                            tempHeads.push(headListHere[0]);
                            placed = true;
                            break;
                        }
                    }
                }
                if (!placed) {
                    success = false;
                    break;
                }
            }
            if (success && tempHeads.length === PLANE_COUNT) {
                headPositions = tempHeads;
                return true;
            }
        }
        // 安全后备布局 (硬编码不重叠士字形)
        return forceSafePlacement();
    }

    // 后备安全布局（保证四架不重叠）
    function forceSafePlacement() {
        clearGameData();
        // 飞机1: 朝下 起始(2,2)
        const shape1 = rotateShape(BASE_PLANE_SHAPE, 0);
        const head1 = [];
        placePlane(shape1, 2, 2, head1);
        // 飞机2: 朝右 起始(8,10)
        const shape2 = rotateShape(BASE_PLANE_SHAPE, 1);
        const head2 = [];
        placePlane(shape2, 8, 10, head2);
        // 飞机3: 朝上 起始(0,12)
        const shape3 = rotateShape(BASE_PLANE_SHAPE, 2);
        const head3 = [];
        placePlane(shape3, 0, 12, head3);
        // 飞机4: 朝左 起始(12,3)
        const shape4 = rotateShape(BASE_PLANE_SHAPE, 3);
        const head4 = [];
        placePlane(shape4, 12, 3, head4);
        headPositions = [head1[0], head2[0], head3[0], head4[0]];
        return true;
    }

    function updateScoreUI() {
        headsFoundSpan.innerText = headsDiscovered;
    }

    // 胜利弹窗：自定义祝贺语
    function showVictoryCelebration() {
        if (window.victoryToastActive) return;
        window.victoryToastActive = true;
        const toast = document.createElement('div');
        toast.className = 'victory-toast';
        toast.innerHTML = '🎉 祝贺你，为中国机长的诞生献上礼炮！ 🎉';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, -50%) scale(0.9)';
            setTimeout(() => {
                if (toast && toast.parentNode) toast.remove();
                window.victoryToastActive = false;
            }, 300);
        }, 2500);
    }

    function checkVictory() {
        if (headsDiscovered === PLANE_COUNT && gameActive === true) {
            gameActive = false;
            showVictoryCelebration();
        }
    }

    // 处理格子点击
    function onCellClick(row, col) {
        if (!gameActive) return;
        if (clickedState[row][col]) return;

        const cellDiv = document.querySelector(`.cell[data-row='${row}'][data-col='${col}']`);
        if (!cellDiv) return;

        const cellType = boardType[row][col];
        clickedState[row][col] = true;

        if (cellType === -1) {
            // 未命中 -> 乳白色玻璃
            cellDiv.classList.add('miss');
        } 
        else if (cellType === 0) {
            // 机身 -> 绿色
            cellDiv.classList.add('body-hit');
        } 
        else if (cellType === 1) {
            // 机头 -> 红色，并记录发现
            cellDiv.classList.add('head-hit');
            const key = `${row},${col}`;
            if (!discoveredHeadsSet.has(key)) {
                discoveredHeadsSet.add(key);
                headsDiscovered++;
                updateScoreUI();
                checkVictory();
            }
        }
    }

    // 渲染网格 (根据当前boardType和clickedState)
    function renderGrid() {
        gridContainer.innerHTML = '';
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (clickedState[i][j]) {
                    const type = boardType[i][j];
                    if (type === -1) cell.classList.add('miss');
                    else if (type === 0) cell.classList.add('body-hit');
                    else if (type === 1) cell.classList.add('head-hit');
                }
                cell.setAttribute('data-row', i);
                cell.setAttribute('data-col', j);
                cell.addEventListener('click', (function(r,c) {
                    return function() { onCellClick(r,c); };
                })(i, j));
                gridContainer.appendChild(cell);
            }
        }
    }

    // 新游戏初始化
    function initNewGame() {
        const success = generateAllPlanes();
        if (!success) forceSafePlacement();
        clickedState = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
        headsDiscovered = 0;
        discoveredHeadsSet.clear();
        gameActive = true;
        updateScoreUI();
        renderGrid();
    }

    function resetGame() {
        initNewGame();
        window.victoryToastActive = false;
        const existingToast = document.querySelector('.victory-toast');
        if(existingToast) existingToast.remove();
    }

    function setupEventListeners() {
        resetBtn.addEventListener('click', resetGame);
    }

    function startGame() {
        setupEventListeners();
        initNewGame();
    }

    startGame();
</script>
</body>
  </html>
